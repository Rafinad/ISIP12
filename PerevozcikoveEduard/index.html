<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой первый сайт</title>
    <link rel="stylesheet" href="style.css">
    <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    line-height: 1.6;
    background-color: #0fbd0cc3;
}

header {
    background: #b41111ad;
    color: rgba(192, 126, 12, 0.087);
    padding: 20px 0;
    text-align: center;
}

header h1 {
    margin-bottom: 14px;
}

nav ul {
    list-style: none;
}

nav ul li {
    display: inline;
    margin: 0 15px;
}

nav ul li a {
    color: rgba(56, 153, 145, 0.584);
    text-decoration: none;
    font-weight: bold;
}

nav ul li a:hover {
    color: rgb(186, 85, 85)
    ;
}

main {
    display: flex;
    justify-content: space-around;
    padding: 20px;
    gap: 20px;
}

section {
    flex: 3;
    background: rgb(20, 133, 26);
    padding: 20px;
    border-radius: 5px;
    box-shadow: 0 0 10px rgba(215, 214, 214, 0.667);
}

aside {
    flex: 1;
    background: rgb(180, 25, 25);
    padding: 20px;
    border-radius: 7px;
    box-shadow: 0 0 10px rgba(197, 190, 190, 0.736);
}

aside h3 {
    margin-bottom: 15px;
    color: #77a5bc;
}

aside ul {
    list-style-type: none;
}

aside ul li {
    margin-bottom: 10px;
}

aside ul li a {
    color: #d25f5f;
    text-decoration: none;
}

aside ul li a:hover {
    color: #a79585bf;
    text-decoration: underline;
}

footer {
    text-align: center;
    padding: 20px;
    background: #501907af;
    color: rgb(17, 135, 32);
    margin-top: 20px;
}
</style>
</head>
<body>
    <header>
        <h1>Добро пожаловать на мою грядку!</h1>
        <nav>
            <ul>  <li><a href="#home">Главная</a></li>
                <li><a href="#about"Правила выживания >/a></li>
                <li><a href="#services">Подсолнухи</a></li>
                <li><a href="#contact">Горохи</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home">
            <h2>Главная страница</h2>
            <p>Для тех кто хочет сохранить свои жизни(и мозги).</p>
        </section>

        <aside>
            <h3>Разделы руководство</h3>
            <ul>
                <li><a href="#">Растения</a></li>
                <li><a href="#">Зомби</a></li>
                <li><a href="#">Способности</a></li>
            </ul>
        </aside>
    </main>

    <footer>
        <p>&copy; 2024 Мой сайт. Все права защищены.</p>
    </footer>
</body>
</html>
